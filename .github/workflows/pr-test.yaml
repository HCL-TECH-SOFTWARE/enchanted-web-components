name: Run test for a PR
on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: PR check test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Clear Cache
        run: rm -rf /tmp/chrome /tmp/chromedriver
      - name: Install dependencies
        run: npm ci
      # Run the primary test suite cleanly by itself
      - name: Run Primary Unit Tests
        run: npm run test-unit
      # Run the prefixed suite only if the first one actually passes
      - name: Run Prefixed Component Tests
        env:
          VITE_COMPONENT_PREFIX: "prefix-"
        run: npm run test-unit