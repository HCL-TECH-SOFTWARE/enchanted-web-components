name: Run test for a PR
on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: PR check test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check System Logs for Out-Of-Memory (OOM) Killer
        if: always() # Guarantees this runs even if the tests fail/crash
        run: |
          echo "=== Checking Linux Kernel Logs for Memory Crashes ==="
          sudo dmesg | grep -i -E 'oom|kill|out of memory' || echo "No OS-level memory termination events found."
      - name: Install dependencies
        run: npm ci
      - name: Clear Corrupted Cache
        run: rm -rf /tmp/chrome /tmp/chromedriver
      - name: Execute unit tests
        run: npm run test